<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TourniMap Hérault | Précision Maximale</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #2563eb; --dark: #1e293b; --bg: #f8fafc; --success: #10b981; }
        body { margin: 0; font-family: 'Inter', sans-serif; display: flex; height: 100vh; background: var(--bg); overflow: hidden;}
        #sidebar { width: 320px; background: white; display: flex; flex-direction: column; box-shadow: 4px 0 15px rgba(0,0,0,0.05); z-index: 3000; padding: 20px; box-sizing: border-box; transition: transform 0.3s ease; position: relative; }
        #sidebar.hidden { transform: translateX(-100%); position: absolute; height: 100%; }
        #toggle-btn { position: absolute; right: -45px; top: 15px; width: 40px; height: 40px; background: var(--primary); color: white; border: none; border-radius: 0 8px 8px 0; cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center; }
        h1 { font-size: 1.1rem; color: var(--dark); margin: 0; }
        .subtitle { font-size: 0.7rem; color: #64748b; margin-bottom: 15px; }
        .label { font-size: 0.65rem; font-weight: 700; color: #94a3b8; text-transform: uppercase; margin: 10px 0 5px 0; }
        select, button.action-btn { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #e2e8f0; font-size: 0.85rem; margin-bottom: 8px; outline: none; }
        button.action-btn { background: var(--primary); color: white; border: none; font-weight: 600; cursor: pointer; }
        #nav-panel { background: #eff6ff; border: 2px solid var(--primary); border-radius: 10px; padding: 12px; margin-top: 10px; display: none; }
        .progress-container { background: #e2e8f0; border-radius: 10px; height: 6px; margin: 8px 0; overflow: hidden; }
        #progress-bar { background: var(--success); width: 0%; height: 100%; transition: width 0.3s; }
        #stats { margin-top: auto; background: #f8fafc; padding: 12px; border-radius: 10px; font-size: 0.75rem; border: 1px solid #e2e8f0; line-height: 1.4; }
        #map { flex-grow: 1; z-index: 1; background: #ddd; }
        .numbered-marker { background-color: var(--primary); color: white; border-radius: 50%; border: 2px solid white; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 600; }
        .marker-active { background-color: var(--success) !important; transform: scale(1.2); z-index: 1000 !important; }
        @media (max-width: 600px) { #sidebar { width: 280px; position: absolute; height: 100%; } }
    </style>
</head>
<body>

<div id="sidebar">
    <button id="toggle-btn" onclick="toggleSidebar()">☰</button>
    <h1>TourniMap Hérault</h1>
    <div class="subtitle">MBS Junior Conseil</div>
    <div class="label">1. Transport</div>
    <select id="modeSelect" onchange="resetEtCalculer()">
        <option value="foot">🚶 Marche / Tramway (5 km/h)</option>
        <option value="driving">🚗 Voiture (Temps Réel)</option>
    </select>
    <div class="label">2. Secteur (Max 50 pts)</div>
    <select id="zoneSelect" onchange="resetEtCalculer()"></select>
    <div id="nav-panel">
        <div id="current-target-name" style="font-weight:600; font-size:0.85rem;">-</div>
        <div class="progress-container"><div id="progress-bar"></div></div>
        <div id="current-target-info" style="font-size:0.7rem; color:#64748b;">-</div>
        <button class="action-btn" onclick="etapeSuivante()" style="background:var(--success); margin-top:8px;">Étape Validée</button>
    </div>
    <div id="stats">Chargement...</div>
</div>
<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>

<script>
    function toggleSidebar() {
        const s = document.getElementById('sidebar');
        document.getElementById('toggle-btn').innerText = s.classList.toggle('hidden') ? '☰' : '✕';
    }

    const startPos = [43.6219, 3.8347];
    const map = L.map('map', { zoomControl: false }).setView(startPos, 11);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);

    let markersLayer = L.featureGroup().addTo(map);
    let routeLayer = L.featureGroup().addTo(map);
    let allData = [];
    let pointsDeLaTournee = [];
    let indexEtapeActuelle = 0;
    let segmentsTime = [];

    function formaterTemps(min) {
        return min < 60 ? `${min} min` : `${Math.floor(min/60)}h ${min%60}min`;
    }

    // IA Sectorisation - Limite 50
    function sectoriser(points, k) {
        let centers = points.slice(0, k).map(p => ({lat: p.Latitude, lng: p.Longitude}));
        let assign = new Array(points.length).fill(-1);
        for(let iter=0; iter<10; iter++){
            let counts = new Array(k).fill(0);
            let prefs = points.map((p, i) => {
                let d = centers.map((c, j) => ({j, dist: Math.pow(p.Latitude-c.lat,2)+Math.pow(p.Longitude-c.lng,2)}));
                return {i, d: d.sort((a,b)=>a.dist-b.dist)};
            }).sort((a,b) => a.d[0].dist - b.d[0].dist);
            
            prefs.forEach(p => {
                for(let pr of p.d) {
                    if(counts[pr.j] < 50) { assign[p.i] = pr.j; counts[pr.j]++; break; }
                }
            });
        }
        points.forEach((p, i) => p.Zone = assign[i] + 1);
    }

    Papa.parse("commerces.csv", {
        download: true, header: true, skipEmptyLines: true,
        complete: function(r) {
            allData = r.data.map(d => ({
                ...d, Latitude: parseFloat(d.Latitude.toString().replace(',','.')),
                Longitude: parseFloat(d.Longitude.toString().replace(',','.'))
            })).filter(d => !isNaN(d.Latitude));
            
            let nb = Math.ceil(allData.length / 50);
            sectoriser(allData, nb);
            
            let s = document.getElementById('zoneSelect');
            s.innerHTML = '<option value="">-- Choisir --</option>';
            for(let i=1; i<=nb; i++) {
                let c = allData.filter(d => d.Zone === i).length;
                if(c>0) s.innerHTML += `<option value="${i}">Secteur ${i} (${c} pts)</option>`;
            }
            document.getElementById('stats').innerHTML = "Données prêtes.";
        }
    });

    function resetEtCalculer() { indexEtapeActuelle = 0; lancerCalcul(); }

    async function lancerCalcul() {
        const zi = parseInt(document.getElementById('zoneSelect').value);
        if(!zi) return;
        markersLayer.clearLayers(); routeLayer.clearLayers();
        let mode = document.getElementById('modeSelect').value;
        let filtered = allData.filter(d => d.Zone === zi);
        
        // Ordonner (TSP simplifié)
        let pts = [...filtered]; pointsDeLaTournee = [];
        let cur = {lat: startPos[0], lng: startPos[1]};
        while(pts.length > 0) {
            let nearIdx = 0, minD = Infinity;
            pts.forEach((p, i) => {
                let d = Math.pow(cur.lat-p.Latitude,2)+Math.pow(cur.lng-p.Longitude,2);
                if(d < minD) { minD = d; nearIdx = i; }
            });
            let p = pts.splice(nearIdx, 1)[0];
            pointsDeLaTournee.push(p); cur = {lat: p.Latitude, lng: p.Longitude};
        }

        L.marker(startPos, {icon: L.divIcon({className:'numbered-marker', html:'🏠', iconSize:[24,24]})}).addTo(markersLayer);
        pointsDeLaTournee.forEach((p, i) => {
            L.marker([p.Latitude, p.Longitude], {icon: L.divIcon({className:`numbered-marker marker-id-${i}`, html:`${i+1}`, iconSize:[20,20]})}).addTo(markersLayer);
        });

        let coords = [startPos[1]+","+startPos[0], ...pointsDeLaTournee.map(p => p.Longitude+","+p.Latitude)];
        let totalD = 0, totalT = 0; segmentsTime = [];

        try {
            document.getElementById('stats').innerHTML = "⌛ Calcul précis...";
            for(let i=0; i<coords.length-1; i+=14) {
                let chunk = coords.slice(i, i+15);
                let res = await fetch(`https://router.project-osrm.org/route/v1/driving/${chunk.join(';')}?overview=full&geometries=geojson`);
                let d = await res.json();
                if(d.code === 'Ok') {
                    L.geoJSON(d.routes[0].geometry, {style: {color: mode==='foot'?'#10b981':'#2563eb', weight:3}}).addTo(routeLayer);
                    totalD += d.routes[0].distance;
                    d.routes[0].legs.forEach(leg => {
                        // VITESSE MANUELLE POUR MARCHE (5km/h = 1.38 m/s)
                        let sec = mode === 'foot' ? (leg.distance / 1.38) : leg.duration;
                        totalT += sec;
                        segmentsTime.push(Math.max(1, Math.round(sec/60)));
                    });
                }
                await new Promise(r => setTimeout(r, 200));
            }
            document.getElementById('stats').innerHTML = `<b>Secteur ${zi}</b><br>📏 Distance : ${(totalD/1000).toFixed(1)} km<br>⏱️ Trajet : <b>${formaterTemps(Math.round(totalT/60))}</b>`;
            document.getElementById('nav-panel').style.display = 'block';
            majUIEtape();
            map.fitBounds(markersLayer.getBounds(), {padding:[30,30]});
        } catch(e) { document.getElementById('stats').innerHTML = "⚠️ Erreur réseau."; }
    }

    function etapeSuivante() {
        if(indexEtapeActuelle < pointsDeLaTournee.length-1) { indexEtapeActuelle++; majUIEtape(); }
        else alert("Mission terminée !");
    }

    function majUIEtape() {
        const p = pointsDeLaTournee[indexEtapeActuelle];
        document.getElementById('current-target-name').innerText = `${indexEtapeActuelle+1}. ${p["NOM DANS LISTING"]}`;
        document.getElementById('current-target-info').innerText = `Trajet : ~${formaterTemps(segmentsTime[indexEtapeActuelle])} (${p.ADRESSE})`;
        document.getElementById('progress-bar').style.width = ((indexEtapeActuelle+1)/pointsDeLaTournee.length*100) + "%";
        document.querySelectorAll('.numbered-marker').forEach(el => el.classList.remove('marker-active'));
        const active = document.querySelector(`.marker-id-${indexEtapeActuelle}`);
        if(active) active.classList.add('marker-active');
    }
</script>
</body>
</html>

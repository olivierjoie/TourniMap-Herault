<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TourniMap Hérault v3 | MBS Junior Conseil</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #2563eb; --dark: #1e293b; --bg: #f8fafc; }
        body { margin: 0; font-family: 'Inter', sans-serif; display: flex; height: 100vh; background: var(--bg); overflow: hidden;}
        
        /* Sidebar Style */
        #sidebar { width: 350px; background: white; display: flex; flex-direction: column; box-shadow: 4px 0 15px rgba(0,0,0,0.05); z-index: 2000; padding: 25px; box-sizing: border-box; }
        h1 { font-size: 1.3rem; color: var(--dark); margin-bottom: 5px; margin-top: 0; }
        .subtitle { font-size: 0.8rem; color: #64748b; margin-bottom: 25px; }
        .label { font-size: 0.75rem; font-weight: 600; color: #94a3b8; text-transform: uppercase; margin: 15px 0 5px 0; }
        select, button { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #e2e8f0; font-size: 0.9rem; margin-bottom: 10px; outline: none; box-sizing: border-box; }
        button { background: var(--primary); color: white; border: none; font-weight: 600; cursor: pointer; transition: background 0.2s; }
        button:hover { background: #1d4ed8; }
        button.secondary { background: #f1f5f9; color: var(--dark); border: 1px solid #e2e8f0; }
        #stats { margin-top: auto; background: #f8fafc; padding: 15px; border-radius: 10px; font-size: 0.85rem; border: 1px solid #e2e8f0; color: var(--dark); line-height: 1.5; }
        #map { flex-grow: 1; z-index: 1; }
        .warning { color: #f59e0b; font-size: 0.75rem; margin-top: 5px; font-weight: 600; display: none; text-align: center;}

        /* --- NOUVEAU : Styles pour Marqueurs Numérotés --- */
        .numbered-marker {
            background-color: var(--primary);
            color: white;
            border-radius: 50%;
            border: 2px solid white;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: 600;
            transition: transform 0.2s;
        }
        .numbered-marker:hover {
            transform: scale(1.2);
            background-color: #1d4ed8;
            z-index: 1000 !important;
        }
        .start-marker {
            font-size: 18px;
            background: none;
            border: none;
            box-shadow: none;
        }
        .leaflet-popup-content-wrapper { border-radius: 8px; padding: 5px; }
        .leaflet-popup-content b { color: var(--primary); font-size: 1.1rem; }

        @media (max-width: 768px) {
            body { flex-direction: column; }
            #sidebar { width: 100%; height: auto; padding: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
            #map { flex-grow: 1; }
        }
    </style>
</head>
<body>

<div id="sidebar">
    <h1>TourniMap Hérault</h1>
    <div class="subtitle">Enquête MBS Junior Conseil</div>
    
    <div class="label">Zone cible</div>
    <select id="zoneSelect" onchange="resetEtCalculer()">
        <option value="">-- Choisir une zone --</option>
        <script>for(let i=1; i<=13; i++) document.write(`<option value="${i}">Zone ${i}</option>`);</script>
    </select>

    <div class="label">Transport</div>
    <select id="modeSelect" onchange="lancerCalcul()">
        <option value="foot">🚶 Marche / Tramway (Priorité)</option>
        <option value="driving">🚗 Voiture (Trajets longs)</option>
    </select>

    <button onclick="combinerZones()" class="secondary">➕ Combiner avec zone précédente</button>
    <div id="routeWarning" class="warning">⚠️ Itinéraire simplifié (certains points sont inaccessibles par la route).</div>
    
    <div id="stats"><i>Sélectionnez une zone pour générer l'ordre de passage optimisé.</i></div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>

<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TourniMap Hérault | Final Fix</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #2563eb; --dark: #1e293b; --bg: #f8fafc; --success: #10b981; }
        body { margin: 0; font-family: 'Inter', sans-serif; display: flex; height: 100vh; background: var(--bg); overflow: hidden;}
        #sidebar { width: 350px; background: white; display: flex; flex-direction: column; box-shadow: 4px 0 15px rgba(0,0,0,0.05); z-index: 2000; padding: 25px; box-sizing: border-box; }
        h1 { font-size: 1.3rem; color: var(--dark); margin: 0; }
        .subtitle { font-size: 0.8rem; color: #64748b; margin-bottom: 20px; }
        .label { font-size: 0.75rem; font-weight: 600; color: #94a3b8; text-transform: uppercase; margin: 10px 0 5px 0; }
        select, button { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #e2e8f0; font-size: 0.9rem; margin-bottom: 8px; outline: none; }
        button { background: var(--primary); color: white; border: none; font-weight: 600; cursor: pointer; }
        button.secondary { background: #f1f5f9; color: var(--dark); border: 1px solid #e2e8f0; }
        #nav-panel { background: #eff6ff; border: 2px solid var(--primary); border-radius: 12px; padding: 15px; margin-top: 10px; display: none; }
        .next-name { font-size: 1rem; font-weight: 600; color: var(--dark); margin: 5px 0; }
        .progress-container { background: #e2e8f0; border-radius: 10px; height: 8px; margin: 10px 0; overflow: hidden; }
        #progress-bar { background: var(--success); width: 0%; height: 100%; transition: width 0.3s; }
        .btn-next { background: var(--success); margin-top: 10px; }
        #stats { margin-top: auto; background: #f8fafc; padding: 15px; border-radius: 10px; font-size: 0.85rem; border: 1px solid #e2e8f0; min-height: 80px; }
        #map { flex-grow: 1; z-index: 1; }
        .numbered-marker { background-color: var(--primary); color: white; border-radius: 50%; border: 2px solid white; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; }
        .marker-active { background-color: var(--success) !important; transform: scale(1.3); z-index: 1000 !important; }
        .start-marker { background-color: #ef4444 !important; }
        .leaflet-tooltip-own { background-color: var(--dark); color: white; border: none; border-radius: 4px; padding: 5px 10px; font-size: 0.8rem; }
    </style>
</head>
<body>

<div id="sidebar">
    <h1>TourniMap Hérault</h1>
    <div class="subtitle">MBS Junior Conseil</div>
    
    <div class="label">Zone</div>
    <select id="zoneSelect" onchange="resetEtCalculer()">
        <option value="">-- Choisir une zone --</option>
        <script>for(let i=1; i<=13; i++) document.write(`<option value="${i}">Zone ${i}</option>`);</script>
    </select>
    <select id="modeSelect" onchange="lancerCalcul()">
        <option value="foot">🚶 Marche / Tramway</option>
        <option value="driving">🚗 Voiture</option>
    </select>

    <div id="nav-panel">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <span style="font-size:0.7rem; font-weight:bold; color:var(--primary);">SUIVANT</span>
            <span id="progress-text" style="font-size:0.7rem; font-weight:bold;">0/0</span>
        </div>
        <div id="current-target-name" class="next-name">-</div>
        <div class="progress-container"><div id="progress-bar"></div></div>
        <div id="current-target-info" style="font-size:0.8rem; color:#64748b;">-</div>
        <button class="btn-next" onclick="etapeSuivante()">Valider l'étape</button>
    </div>

    <button onclick="combinerZones()" class="secondary" style="margin-top:10px;">➕ Combiner Zone</button>
    <div id="stats">Sélectionnez une zone.</div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>

<script>
    const pointDepartCoords = [43.6219, 3.8347];
    const map = L.map('map', { zoomControl: false }).setView(pointDepartCoords, 13);
    L.control.zoom({ position: 'topright' }).addTo(map);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);

    let markersLayer = L.layerGroup().addTo(map);
    let routeLayer = L.layerGroup().addTo(map);
    let allData = [];
    let zonesActivees = [];
    let pointsDeLaTournee = [];
    let indexEtapeActuelle = 0; 
    let segmentsTime = [];

    Papa.parse("commerces.csv", {
        download: true, header: true, skipEmptyLines: true,
        complete: function(results) { allData = results.data; }
    });

    function ordonnerPointsTSP(depart, points) {
        let pts = [...points];
        let path = [];
        let currentPos = { lat: depart[0], lng: depart[1] };
        while (pts.length > 0) {
            let nearestIdx = 0; let minDist = Infinity;
            for (let i = 0; i < pts.length; i++) {
                let d = Math.sqrt(Math.pow(currentPos.lat - pts[i].Latitude, 2) + Math.pow(currentPos.lng - pts[i].Longitude, 2));
                if (d < minDist) { minDist = d; nearestIdx = i; }
            }
            let p = pts.splice(nearestIdx, 1)[0];
            path.push(p);
            currentPos = { lat: parseFloat(p.Latitude), lng: parseFloat(p.Longitude) };
        }
        return path;
    }

    function resetEtCalculer() {
        const val = document.getElementById('zoneSelect').value;
        if (!val) return;
        zonesActivees = [val];
        indexEtapeActuelle = 0;
        lancerCalcul();
    }

    function combinerZones() {
        const val = document.getElementById('zoneSelect').value;
        if (!val || val <= 1) return;
        const prec = (parseInt(val) - 1).toString();
        if (!zonesActivees.includes(prec)) zonesActivees.push(prec);
        lancerCalcul();
    }

    async function lancerCalcul() {
        markersLayer.clearLayers();
        routeLayer.clearLayers();
        segmentsTime = [];
        
        // VARIABLES DE CUMUL
        let totalDistanceMetres = 0;
        let totalDureeSecondes = 0;

        const mode = document.getElementById('modeSelect').value;
        const statsBox = document.getElementById('stats');
        
        let filtered = allData.filter(d => zonesActivees.includes(d.Zone)).filter(c => c.Latitude && c.Longitude);
        if (filtered.length === 0) return;

        pointsDeLaTournee

<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TourniMap Hérault | Secteurs Équilibrés</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #2563eb; --dark: #1e293b; --bg: #f8fafc; --success: #10b981; }
        body { margin: 0; font-family: 'Inter', sans-serif; display: flex; height: 100vh; background: var(--bg); overflow: hidden;}
        #sidebar { width: 350px; background: white; display: flex; flex-direction: column; box-shadow: 4px 0 15px rgba(0,0,0,0.05); z-index: 2000; padding: 25px; box-sizing: border-box; }
        h1 { font-size: 1.3rem; color: var(--dark); margin: 0; }
        .subtitle { font-size: 0.8rem; color: #64748b; margin-bottom: 20px; }
        .label { font-size: 0.75rem; font-weight: 600; color: #94a3b8; text-transform: uppercase; margin: 10px 0 5px 0; }
        select, button { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #e2e8f0; font-size: 0.9rem; margin-bottom: 8px; outline: none; }
        button { background: var(--primary); color: white; border: none; font-weight: 600; cursor: pointer; }
        #nav-panel { background: #eff6ff; border: 2px solid var(--primary); border-radius: 12px; padding: 15px; margin-top: 10px; display: none; }
        .progress-container { background: #e2e8f0; border-radius: 10px; height: 8px; margin: 10px 0; overflow: hidden; }
        #progress-bar { background: var(--success); width: 0%; height: 100%; transition: width 0.3s; }
        #stats { margin-top: auto; background: #f8fafc; padding: 15px; border-radius: 10px; font-size: 0.85rem; border: 1px solid #e2e8f0; min-height: 80px; }
        #map { flex-grow: 1; z-index: 1; background: #ddd; }
        .numbered-marker { background-color: var(--primary); color: white; border-radius: 50%; border: 2px solid white; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; }
        .marker-active { background-color: var(--success) !important; transform: scale(1.3); z-index: 1000 !important; }
        .start-marker { background-color: #ef4444 !important; }
        .leaflet-tooltip-own { background-color: var(--dark); color: white; border: none; border-radius: 4px; padding: 8px 12px; font-size: 0.8rem; }
    </style>
</head>
<body>

<div id="sidebar">
    <h1>TourniMap Hérault</h1>
    <div class="subtitle">MBS Junior Conseil</div>
    
    <div class="label">Secteur (IA Équilibrée)</div>
    <select id="zoneSelect" onchange="resetEtCalculer()">
        <option value="">-- Analyse des 500 points... --</option>
    </select>
    
    <select id="modeSelect" onchange="lancerCalcul()">
        <option value="foot">🚶 Marche / Tramway</option>
        <option value="driving">🚗 Voiture</option>
    </select>

    <div id="nav-panel">
        <div id="current-target-name" style="font-weight:600;">-</div>
        <div class="progress-container"><div id="progress-bar"></div></div>
        <div id="current-target-info" style="font-size:0.8rem; color:#64748b;">-</div>
        <button onclick="etapeSuivante()" style="background:var(--success); margin-top:10px;">Valider l'étape</button>
    </div>
    
    <div id="stats">Chargement du CSV...</div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>

<script>
    const pointDepartCoords = [43.6219, 3.8347];
    const map = L.map('map', { zoomControl: false }).setView(pointDepartCoords, 10);
    L.control.zoom({ position: 'topright' }).addTo(map);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);

    let markersLayer = L.featureGroup().addTo(map);
    let routeLayer = L.featureGroup().addTo(map);
    let allData = [];
    let pointsDeLaTournee = [];
    let indexEtapeActuelle = 0; 
    let segmentsTime = [];

    // Algorithme de clustering avec contrainte de taille (Equilibrage)
    function clusteringEquilibre(points, k) {
        // 1. Initialisation des centres (Centroids)
        let centroids = [];
        for(let i=0; i<k; i++) {
            let p = points[Math.floor(Math.random() * points.length)];
            centroids.push({ lat: p.Latitude, lng: p.Longitude });
        }

        const maxPointsPerZone = Math.ceil(points.length / k) + 2;
        let assignments = new Array(points.length).fill(-1);

        for (let iter = 0; iter < 15; iter++) {
            let zoneCounts = new Array(k).fill(0);
            
            // Calcul des distances pour tous les points
            let distances = points.map((p, i) => {
                let dToCentroids = centroids.map((c, ci) => ({
                    idx: ci,
                    dist: Math.pow(p.Latitude - c.lat, 2) + Math.pow((p.Longitude - c.lng) * 0.7, 2)
                })).sort((a, b) => a.dist - b.dist);
                return { pointIdx: i, prefs: dToCentroids };
            });

            // Assignation stable : on trie les points par leur "certitude" (différence entre plus proche et 2eme plus proche)
            distances.forEach(d => {
                for (let pref of d.prefs) {
                    if (zoneCounts[pref.idx] < maxPointsPerZone) {
                        assignments[d.pointIdx] = pref.idx;
                        zoneCounts[pref.idx]++;
                        break;
                    }
                }
            });

            // Recalcul des centres
            centroids = centroids.map((c, ci) => {
                let cluster = points.filter((_, i) => assignments[i] === ci);
                if (cluster.length === 0) return c;
                return {
                    lat: cluster.reduce((sum, p) => sum + p.Latitude, 0) / cluster.length,
                    lng: cluster.reduce((sum, p) => sum + p.Longitude, 0) / cluster.length
                };
            });
        }

        points.forEach((p, i) => p.AutoZone = assignments[i] + 1);

        // Tri des zones par distance au départ
        let zoneMeta = centroids.map((c, i) => ({
            oldId: i + 1,
            dist: Math.sqrt(Math.pow(c.lat - pointDepartCoords[0], 2) + Math.pow(c.lng - pointDepartCoords[1], 2))
        })).sort((a, b) => a.dist - b.dist);

        let mapping = {};
        zoneMeta.forEach((m, i) => mapping[m.oldId] = i + 1);
        points.forEach(p => p.AutoZone = mapping[p.AutoZone]);
    }

    Papa.parse("commerces.csv", {
        download: true, header: true, skipEmptyLines: true,
        complete: function(results) { 
            allData = results.data.map(d => ({
                ...d,
                Latitude: parseFloat(d.Latitude),
                Longitude: parseFloat(d.Longitude)
            })).filter(d => !isNaN(d.Latitude) && !isNaN(d.Longitude));

            clusteringEquilibre(allData, 13);

            const select = document.getElementById('zoneSelect');
            select.innerHTML = '<option value="">-- Choisir une zone --</option>';
            for(let i=1; i<=13; i++) {
                let count = allData.filter(d => d.AutoZone === i).length;
                if(count > 0) select.innerHTML += `<option value="${i}">Secteur ${i} (${count} boutiques)</option>`;
            }
            document.getElementById('stats').innerHTML = "Analyse terminée : 13 zones équilibrées créées.";
        }
    });

    function ordonnerPointsTSP(depart, points) {
        let pts = [...points];
        let path = [];
        let cur = { lat: depart[0], lng: depart[1] };
        while (pts.length > 0) {
            let idx = 0; let min = Infinity;
            for (let i = 0; i < pts.length; i++) {
                let d = Math.pow(cur.lat - pts[i].Latitude, 2) + Math.pow(cur.lng - pts[i].Longitude, 2);
                if (d < min) { min = d; idx = i; }
            }
            let p = pts.splice(idx, 1)[0];
            path.push(p);
            cur = { lat: p.Latitude, lng: p.Longitude };
        }
        return path;
    }

    function resetEtCalculer() {
        indexEtapeActuelle = 0;
        lancerCalcul();
    }

    async function lancerCalcul() {
        const zoneIdx = parseInt(document.getElementById('zoneSelect').value);
        if (!zoneIdx) return;

        markersLayer.clearLayers();
        routeLayer.clearLayers();
        segmentsTime = [];
        let totalD = 0; let totalT = 0;
        
        const mode = document.getElementById('modeSelect').value;
        const statsBox = document.getElementById('stats');
        
        let filtered = allData.filter(d => d.AutoZone === zoneIdx);
        pointsDeLaTournee = ordonnerPointsTSP(pointDepartCoords, filtered);

        L.marker(pointDepartCoords, { icon: L.divIcon({ className: 'numbered-marker start-marker', html: '🏠', iconSize: [26, 26] }) }).addTo(markersLayer);
        
        pointsDeLaTournee.forEach((p, i) => {
            const icon = L.divIcon({ className: `numbered-marker marker-id-${i}`, html: `<span>${i+1}</span>`, iconSize: [22, 22] });
            L.marker([p.Latitude, p.Longitude], { icon: icon })
             .addTo(markersLayer)
             .bindTooltip(`<b>${i+1}. ${p["NOM DANS LISTING"]}</b><br>${p.ADRESSE}`, { direction: 'top', className: 'leaflet-tooltip-own' });
        });

        let coords = [pointDepartCoords[1] + "," + pointDepartCoords[0]];
        pointsDeLaTournee.forEach(p => coords.push(p.Longitude + "," + p.Latitude));

        try {
            statsBox.innerHTML = "⌛ Calcul de l'itinéraire...";
            const chunkSize = 15;
            for (let i = 0; i < coords.length - 1; i += chunkSize - 1) {
                const chunk = coords.slice(i, i + chunkSize);
                const url = `https://router.project-osrm.org/route/v1/${mode}/${chunk.join(';')}?overview=full&geometries=geojson`;
                const r = await fetch(url);
                const d = await r.json();
                if (d.code === 'Ok') {
                    L.geoJSON(d.routes[0].geometry, { style: { color: '#2563eb', weight: 4, opacity: 0.5 } }).addTo(routeLayer);
                    totalD += d.routes[0].distance;
                    totalT += d.routes[0].duration;
                    d.routes[0].legs.forEach(l => segmentsTime.push(Math.round(l.duration / 60)));
                }
                await new Promise(res => setTimeout(res, 200));
            }

            statsBox.innerHTML = `📏 ${(totalD / 1000).toFixed(1)} km | ⏱️ ${Math.round(totalT / 60)} min | 📍 ${pointsDeLaTournee.length} boutiques`;
            document.getElementById('nav-panel').style.display = 'block';
            majUIEtape();
            map.fitBounds(markersLayer.getBounds(), { padding: [40, 40] });
        } catch (e) { statsBox.innerHTML = "⚠️ Erreur serveur."; }
    }

    function etapeSuivante() {
        if (indexEtapeActuelle < pointsDeLaTournee.length - 1) {
            indexEtapeActuelle++; majUIEtape();
        } else {
            alert("Secteur terminé !");
        }
    }

    function majUIEtape() {
        const p = pointsDeLaTournee[indexEtapeActuelle];
        document.getElementById('current-target-name').innerText = `${indexEtapeActuelle + 1}. ${p["NOM DANS LISTING"]}`;
        document.getElementById('current-target-info').innerText = `Trajet : ~${segmentsTime[indexEtapeActuelle] || 0} min`;
        document.getElementById('progress-bar').style.width = ((indexEtapeActuelle + 1) / pointsDeLaTournee.length * 100) + "%";
        document.querySelectorAll('.numbered-marker').forEach(el => el.classList.remove('marker-active'));
        const active = document.querySelector(`.marker-id-${indexEtapeActuelle}`);
        if(active) active.classList.add('marker-active');
    }
</script>
</body>
</html>
